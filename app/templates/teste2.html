<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Documento</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px dashed var(--primary);
            border-radius: 0.5rem;
            background-color: #F8FAFC;
            cursor: pointer;
            box-sizing: border-box;
        }
        
        input[type="file"]::file-selector-button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
            margin-right: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: var(--primary-hover);
        }

        button.btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button.btn-submit:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Adicionar Documento</h1>
        <form action="teste3.html" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="documents">Selecione o arquivo</label>
                <input type="file" id="documents">
            </div>
            <button type="button" class="btn-submit" onclick="enviarFormulario()">Enviar</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
